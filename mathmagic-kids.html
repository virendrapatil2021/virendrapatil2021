<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MathMagic Kids 🧮✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
:root{
  --purple:#6C5CE7; --pink:#FD79A8; --teal:#00CEC9;
  --orange:#FDCB6E; --green:#00B894; --red:#D63031;
  --blue:#74B9FF; --dark:#2D3436; --light:#f8f9ff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--light);min-height:100vh;overflow-x:hidden;}

/* ── floating confetti ── */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.confetti span{position:absolute;font-size:clamp(18px,2.5vw,30px);opacity:.08;animation:float 8s ease-in-out infinite alternate;}
@keyframes float{from{transform:translateY(0)rotate(0deg)}to{transform:translateY(-40px)rotate(25deg)}}

/* ── header ── */
header{background:linear-gradient(135deg,#6C5CE7,#a29bfe,#fd79a8);padding:16px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 6px 30px #6C5CE755;position:relative;z-index:20;}
.logo{font-family:'Fredoka One',cursive;font-size:clamp(20px,4vw,32px);color:#fff;}
.logo small{display:block;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;opacity:.8;}
.stars{margin-left:auto;background:var(--orange);border-radius:30px;padding:7px 18px;font-weight:900;font-size:15px;color:var(--dark);box-shadow:0 3px 14px #fdcb6e99;}
.stars.pop{animation:pop .35s ease;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

/* ── chapter tabs ── */
.chapters{display:flex;overflow-x:auto;gap:0;background:#fff;border-bottom:3px solid #eee;position:sticky;top:0;z-index:15;scrollbar-width:none;}
.chapters::-webkit-scrollbar{display:none;}
.ch-btn{flex-shrink:0;padding:11px 14px;border:none;background:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:#aaa;border-bottom:3px solid transparent;margin-bottom:-3px;white-space:nowrap;transition:all .2s;}
.ch-btn.active{color:var(--active-color,#6C5CE7);border-bottom-color:var(--active-color,#6C5CE7);}

/* ── learn / quiz toggle ── */
.mode-row{display:flex;gap:10px;padding:14px 14px 0;justify-content:center;}
.mode-btn{padding:10px 24px;border-radius:30px;border:2.5px solid #eee;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;color:#aaa;transition:all .2s;}
.mode-btn.active{background:var(--active-color,#6C5CE7);color:#fff;border-color:var(--active-color,#6C5CE7);box-shadow:0 4px 16px var(--active-color,#6C5CE7)66;}

main{padding:14px 14px 90px;max-width:680px;margin:0 auto;position:relative;z-index:2;}

/* ── fun intro banner ── */
.intro-banner{border-radius:22px;overflow:hidden;margin-bottom:16px;position:relative;box-shadow:0 6px 28px #0002;animation:slideIn .35s ease both;}
.intro-banner img{width:100%;height:160px;object-fit:cover;display:block;}
.intro-overlay{position:absolute;bottom:0;left:0;right:0;padding:14px 18px;background:linear-gradient(transparent,rgba(0,0,0,.7));}
.intro-title{font-family:'Fredoka One',cursive;font-size:22px;color:#fff;}
.intro-sub{font-size:12px;color:rgba(255,255,255,.85);font-weight:700;}

/* ── cards ── */
.card{background:#fff;border-radius:20px;padding:18px 16px;margin-bottom:14px;box-shadow:0 4px 20px #0000000d;animation:slideIn .4s ease both;}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.card-emoji{font-size:32px;}
.card-title{font-size:16px;font-weight:900;}
.card-sub{font-size:12px;color:#999;font-weight:700;margin-top:1px;}

/* ── formula pill ── */
.formula-box{background:#f4f6f9;border-radius:14px;padding:12px 15px;margin:10px 0;display:flex;flex-direction:column;gap:7px;}
.formula{font-family:'Courier New',monospace;font-size:14px;font-weight:700;color:var(--dark);}

/* ── example bubbles ── */
.ex-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}
.ex-bub{flex:1;min-width:130px;border-radius:14px;padding:9px 13px;}
.ex-lbl{font-size:10px;font-weight:800;color:#aaa;text-transform:uppercase;}
.ex-val{font-size:16px;font-weight:900;color:var(--dark);}

/* ── tip box ── */
.tip{border-radius:12px;padding:10px 13px;font-size:13.5px;line-height:1.55;font-weight:600;color:#555;margin-top:8px;}

/* ── sign table ── */
.sign-tbl{width:100%;border-collapse:collapse;margin-top:10px;border-radius:12px;overflow:hidden;}
.sign-tbl th{background:#f0f0f0;padding:9px 6px;font-size:12px;font-weight:800;text-align:center;}
.sign-tbl td{padding:11px 6px;text-align:center;border-bottom:1px solid #f5f5f5;font-weight:800;font-size:18px;}

/* ── step card ── */
.steps{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.step{display:flex;gap:10px;align-items:flex-start;}
.step-num{min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff;flex-shrink:0;}
.step-text{font-size:14px;font-weight:700;color:#555;line-height:1.5;padding-top:4px;}

/* ── conversion table ── */
.conv-tbl{width:100%;border-collapse:collapse;margin-top:8px;}
.conv-tbl td{padding:8px 10px;border-bottom:1px solid #f3f3f3;font-size:14px;}
.conv-tbl td:first-child{font-weight:900;color:var(--dark);}
.conv-tbl td:last-child{color:#666;font-weight:600;}


/* ── quiz ── */
.quiz-wrap{display:flex;flex-direction:column;gap:14px;}
.q-progress{font-size:13px;font-weight:800;color:#aaa;}
.prog-bar{height:8px;background:#eee;border-radius:10px;margin-top:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:10px;transition:width .5s;}
.quiz-card{border-radius:22px;overflow:hidden;background:#fff;box-shadow:0 4px 24px #00000012;animation:slideIn .3s ease both;}
.quiz-img{width:100%;height:110px;object-fit:cover;display:block;filter:brightness(.88)saturate(1.2);}
.quiz-inner{padding:20px 18px;}
.q-text{font-size:clamp(22px,5vw,30px);font-weight:900;color:var(--dark);text-align:center;margin-bottom:18px;}
.q-input{width:100%;padding:15px;font-size:22px;font-weight:900;border:3px solid #eee;border-radius:15px;outline:none;text-align:center;color:var(--dark);font-family:'Nunito',sans-serif;margin-bottom:12px;transition:border-color .2s;}
.q-input:focus{border-color:var(--active-color,#6C5CE7);}
.btn-row{display:flex;gap:9px;}
.check-btn{flex:2;padding:14px;border-radius:14px;border:none;color:#fff;font-size:16px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;}
.hint-btn{flex:1;padding:14px;border-radius:14px;border:2.5px solid #eee;background:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:#aaa;}
.hint-box{margin-top:10px;background:#fff3cd;border:2px solid #ffc107;border-radius:13px;padding:11px 14px;font-size:13px;font-weight:700;color:#555;display:none;}
.hint-box.show{display:block;animation:slideIn .2s ease;}
.fb-box{margin-top:12px;border-radius:14px;padding:14px 16px;font-size:15px;font-weight:800;display:none;flex-direction:column;gap:8px;align-items:center;text-align:center;}
.fb-box.show{display:flex;animation:slideIn .3s ease;}
.correct{background:#d4edda;border:2.5px solid #28a745;color:#155724;}
.wrong{background:#fdecea;border:2.5px solid #dc3545;color:#721c24;}
.next-btn{padding:10px 26px;border-radius:11px;border:none;color:#fff;font-size:14px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;}
.score-card{background:linear-gradient(135deg,#FDCB6E,#e17055);border-radius:18px;padding:16px;text-align:center;font-size:19px;font-weight:900;color:#fff;box-shadow:0 5px 18px #fdcb6e55;}

@media(max-width:480px){header{padding:12px}main{padding:10px 10px 80px}.chapters{font-size:12px}}
</style>
</head>
<body>

<div class="confetti">
  <span style="top:3%;left:2%;animation-delay:0s">➕</span>
  <span style="top:12%;left:15%;animation-delay:1s">🔢</span>
  <span style="top:5%;left:30%;animation-delay:1.8s">➖</span>
  <span style="top:20%;left:45%;animation-delay:.5s">⭐</span>
  <span style="top:3%;left:60%;animation-delay:2.2s">✖️</span>
  <span style="top:15%;left:75%;animation-delay:.9s">🎯</span>
  <span style="top:6%;left:88%;animation-delay:1.5s">🧮</span>
  <span style="top:30%;left:95%;animation-delay:.3s">🏆</span>
  <span style="top:50%;left:2%;animation-delay:2s">💡</span>
  <span style="top:65%;left:88%;animation-delay:1.2s">🎉</span>
  <span style="top:80%;left:50%;animation-delay:.7s">🌟</span>
  <span style="top:88%;left:18%;animation-delay:1.6s">🎮</span>
</div>

<header>
  <span style="font-size:40px">🧮</span>
  <div>
    <div class="logo">MathMagic Kids ✨<small>Your Fun Formula Book!</small></div>
  </div>
  <div class="stars" id="scoreBadge">⭐ 0 pts</div>
</header>

<!-- Chapter tabs -->
<div class="chapters" id="chapters">
  <button class="ch-btn active" onclick="setChapter(0)" style="--active-color:#6C5CE7">🔢 Zero & One</button>
  <button class="ch-btn"        onclick="setChapter(1)" style="--active-color:#00CEC9">🔵 Decimals</button>
  <button class="ch-btn"        onclick="setChapter(2)" style="--active-color:#e17055">🔗 LCM & HCF</button>
  <button class="ch-btn"        onclick="setChapter(3)" style="--active-color:#FD79A8">🍕 Fractions</button>
  <button class="ch-btn"        onclick="setChapter(4)" style="--active-color:#00B894">🔤 Algebra</button>
  <button class="ch-btn"        onclick="setChapter(5)" style="--active-color:#FF6B6B">➕ Add/Sub Signs</button>
  <button class="ch-btn"        onclick="setChapter(6)" style="--active-color:#A29BFE">✖️ Mul Signs</button>
  <button class="ch-btn"        onclick="setChapter(7)" style="--active-color:#FDCB6E">📐 Geometry</button>
  <button class="ch-btn"        onclick="setChapter(8)" style="--active-color:#74B9FF">📏 Conversions</button>
</div>

<!-- Mode toggle -->
<div class="mode-row">
  <button class="mode-btn active" id="learnBtn" onclick="setMode('learn')">📖 Learn</button>
  <button class="mode-btn"        id="quizBtn"  onclick="setMode('quiz')">🎮 Quiz Me!</button>
</div>

<main id="main"></main>

// ── State ────────────────────────────────────────────────────────────────────
let ch=0, mode='learn', score=0, qIdx=0, answered=false;

function activeColor(){return CHAPTERS[ch].color;}
function setActiveColor(c){
  document.documentElement.style.setProperty('--active-color',c);
  document.querySelectorAll('.ch-btn')[ch].style.setProperty('--active-color',c);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  setActiveColor(activeColor());
  document.getElementById('main').innerHTML = mode==='learn' ? renderLearn() : renderQuiz();
}

function renderLearn(){
  const C = CHAPTERS[ch];
  let html = `
  <div class="intro-banner" style="border-top:5px solid ${C.color}">
    <img src="data:image/jpeg;base64,${C.img}" alt="topic"/>
    <div class="intro-overlay">
      <div class="intro-title">${C.emoji} ${C.label.replace(/^.+? /,'')}</div>
      <div class="intro-sub">${C.imgSub}</div>
    </div>
  </div>`;

  C.cards.forEach((card,i)=>{
    html+=`<div class="card" style="border-top:4px solid ${card.color};animation-delay:${i*.12}s">
      <div class="card-top">
        <span class="card-emoji">${card.emoji}</span>
        <div><div class="card-title" style="color:${card.color}">${card.title}</div><div class="card-sub">${card.sub}</div></div>
      </div>
      ${card.content}
    </div>`;
  });

  return html;
}

function renderQuiz(){
  const C = CHAPTERS[ch];
  const qs = C.quiz;
  const q  = qs[qIdx % qs.length];
  const pct = (((qIdx % qs.length)+1)/qs.length*100).toFixed(0);

  return `<div class="quiz-wrap">
    <div class="q-progress">
      Question ${(qIdx%qs.length)+1} of ${qs.length}
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${activeColor()}"></div></div>
    </div>
    <div class="quiz-card" style="border-top:6px solid ${activeColor()}">
      <img class="quiz-img" src="data:image/jpeg;base64,${C.img}" alt="topic"/>
      <div class="quiz-inner">
        <div class="q-text">${q.q}</div>
        <input class="q-input" id="ansInput" type="text" placeholder="Type your answer…"
          onkeydown="if(event.key==='Enter')checkAns()" autocomplete="off" spellcheck="false"/>
        <div class="btn-row">
          <button class="check-btn" id="checkBtn" style="background:${activeColor()}" onclick="checkAns()">✅ Check!</button>
          <button class="hint-btn" onclick="showHint()">💡 Hint</button>
        </div>
        <div class="hint-box" id="hintBox">💡 ${q.hint}</div>
        <div class="fb-box correct" id="correctBox">
          <div>🎉 Correct! You're amazing! +1 point!</div>
          <button class="next-btn" style="background:${activeColor()}" onclick="nextQ()">Next ➡️</button>
        </div>
        <div class="fb-box wrong" id="wrongBox">
          <div>😅 Not quite! Answer is <strong>${q.a}</strong></div>
          <div style="font-size:12px;color:#888">💡 ${q.hint}</div>
          <button class="next-btn" style="background:#636e72" onclick="nextQ()">Try Next ➡️</button>
        </div>
      </div>
    </div>
    <div class="score-card">🏆 Score: <strong>${score}</strong> correct answer${score!==1?'s':''}! Keep going! 🚀</div>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function setChapter(i){
  ch=i; qIdx=0; answered=false;
  document.querySelectorAll('.ch-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  render();
  document.getElementById('main').scrollIntoView({behavior:'smooth',block:'start'});
}

function setMode(m){
  mode=m; answered=false;
  document.getElementById('learnBtn').classList.toggle('active',m==='learn');
  document.getElementById('quizBtn').classList.toggle('active',m==='quiz');
  render();
}

function checkAns(){
  if(answered)return;
  const inp=document.getElementById('ansInput');
  if(!inp||!inp.value.trim())return;
  const correct=inp.value.trim().toLowerCase()===CHAPTERS[ch].quiz[qIdx%CHAPTERS[ch].quiz.length].a.toLowerCase();
  answered=true; inp.disabled=true;
  document.getElementById('checkBtn').disabled=true;
  if(correct){
    score++;
    const badge=document.getElementById('scoreBadge');
    badge.textContent=`⭐ ${score} pts`;
    badge.classList.add('pop');
    setTimeout(()=>badge.classList.remove('pop'),400);
    document.getElementById('correctBox').classList.add('show');
  } else {
    document.getElementById('wrongBox').classList.add('show');
  }
}

function showHint(){const h=document.getElementById('hintBox');if(h)h.classList.add('show');}
function nextQ(){qIdx=(qIdx+1)%CHAPTERS[ch].quiz.length;answered=false;render();}

// init
setActiveColor(activeColor());
render();
</script>
</body>
</html>
